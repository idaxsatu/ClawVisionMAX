<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>ClawVisionMAX</title>
  <style>
    :root{
      --bg0:#070912;
      --bg1:#0b1022;
      --panel:#0e1531cc;
      --stroke:#1d2a56;
      --stroke2:#2b3a78;
      --txt:#e9eeff;
      --muted:#a9b6e7;
      --muted2:#7f92d6;
      --ok:#34f5a2;
      --warn:#ffcf5c;
      --bad:#ff5d7a;
      --chip:#101a3e;
      --chip2:#0f1a44;
      --accent:#7c5cff;
      --accent2:#2fe7ff;
      --accent3:#ff6ad5;
      --shadow: 0 18px 70px rgba(0,0,0,.55);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      --radius: 18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--txt);
      background:
        radial-gradient(900px 480px at 18% 12%, rgba(124,92,255,.22), transparent 60%),
        radial-gradient(1000px 520px at 82% 22%, rgba(47,231,255,.18), transparent 62%),
        radial-gradient(900px 560px at 48% 86%, rgba(255,106,213,.14), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    .wrap{
      max-width:1200px;
      margin: 0 auto;
      padding: 28px 18px 70px;
    }

    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      gap:14px;
      align-items:center;
    }
    .logo{
      width:46px;height:46px;border-radius:14px;
      background:
        radial-gradient(12px 12px at 28% 30%, rgba(47,231,255,.9), transparent 60%),
        radial-gradient(18px 16px at 68% 62%, rgba(255,106,213,.7), transparent 60%),
        linear-gradient(135deg, rgba(124,92,255,.9), rgba(47,231,255,.35));
      box-shadow: 0 10px 40px rgba(124,92,255,.25);
      border: 1px solid rgba(255,255,255,.08);
      position:relative;
      overflow:hidden;
    }
    .logo:after{
      content:"";
      position:absolute; inset:-40% -30%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      transform: rotate(22deg);
      animation: sweep 7.8s linear infinite;
      opacity:.75;
    }
    @keyframes sweep{0%{transform:translateX(-40%) rotate(22deg)}100%{transform:translateX(40%) rotate(22deg)}}

    .brand h1{
      margin:0;
      font-size: 22px;
      letter-spacing:.3px;
      font-weight: 780;
      line-height:1.08;
    }
    .brand p{
      margin:4px 0 0;
      color:var(--muted);
      font-size: 13px;
      max-width: 560px;
    }

    .topActions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
      padding-top:2px;
    }

    .btn{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(15,26,68,.65);
      color: var(--txt);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight: 650;
      font-size: 13px;
      box-shadow: 0 8px 26px rgba(0,0,0,.22);
      transition: transform .08s ease, border-color .12s ease, background .12s ease;
      display:inline-flex;
      gap:8px;
      align-items:center;
      user-select:none;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(124,92,255,.45); background: rgba(17,30,88,.75); }
    .btn:active{ transform: translateY(0px); }
    .btn.primary{
      background: linear-gradient(135deg, rgba(124,92,255,.95), rgba(47,231,255,.28));
      border-color: rgba(124,92,255,.55);
    }
    .btn.danger{
      background: rgba(255,93,122,.10);
      border-color: rgba(255,93,122,.35);
    }

    .pill{
      border: 1px solid rgba(255,255,255,.10);
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(10,16,40,.55);
      color: var(--muted);
      font-size: 12px;
      display:inline-flex;
      gap:8px;
      align-items:center;
    }
    .dot{
      width:10px; height:10px; border-radius:999px;
      background: rgba(255,255,255,.18);
      box-shadow: 0 0 0 3px rgba(255,255,255,.05);
    }
    .dot.ok{ background: var(--ok); box-shadow: 0 0 0 3px rgba(52,245,162,.10); }
    .dot.bad{ background: var(--bad); box-shadow: 0 0 0 3px rgba(255,93,122,.10); }
    .dot.warn{ background: var(--warn); box-shadow: 0 0 0 3px rgba(255,207,92,.10); }

    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:14px;
      margin-top: 14px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
      .topActions{ justify-content:flex-start; }
    }
